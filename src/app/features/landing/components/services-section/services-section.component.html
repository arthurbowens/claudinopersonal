<section
  id="servicos"
  class="border-b border-white/5 bg-zinc-950 px-4 py-16 md:px-6 md:py-24"
  aria-labelledby="services-heading"
>
  <div class="mx-auto max-w-7xl">
    <h2
      id="services-heading"
      class="text-center text-3xl font-bold tracking-tight text-white md:text-4xl"
    >
      Como funciona o acompanhamento
    </h2>
    <p class="mx-auto mt-3 max-w-2xl text-center text-zinc-400">
      Depois da conversa no WhatsApp, se fizer sentido para você, eu monto um plano com treino
      adaptado à sua idade, ao seu tempo e ao que você sente hoje — com acompanhamento próximo.
    </p>

    <div class="mt-12 grid gap-6 md:grid-cols-3">
      @for (item of items; track item.title) {
        <article
          class="rounded-2xl border border-white/10 bg-black/40 p-6 transition-colors hover:border-[#00df82]/30"
        >
          <h3 class="text-lg font-bold text-[#00df82]">{{ item.title }}</h3>
          <p class="mt-3 text-sm leading-relaxed text-zinc-300">{{ item.desc }}</p>
        </article>
      }
    </div>
  </div>
</section>
